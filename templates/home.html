<!DOCTYPE html>
<html>
<head>
    <title>Electric Motor Temperature Prediction</title>
</head>
<body>

    <h1>Electric Motor Temperature Prediction</h1>

    <form action="/predict" method="post">

        <input type="text" name="ambient" placeholder="Ambient Temperature" required><br><br>

        <input type="text" name="coolant" placeholder="Coolant Temperature" required><br><br>

        <input type="text" name="u_d" placeholder="U_d" required><br><br>

        <input type="text" name="u_q" placeholder="U_q" required><br><br>

        <input type="text" name="motor_speed" placeholder="Motor Speed" required><br><br>

        <input type="text" name="i_d" placeholder="I_d" required><br><br>

        <input type="text" name="i_q" placeholder="I_q" required><br><br>

        <button type="submit">Predict</button>

    </form>

    <br>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
